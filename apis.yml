aid: blockchair
url: https://raw.githubusercontent.com/api-evangelist/blockchair/refs/heads/main/apis.yml
name: Blockchair
kind: company
description: Blockchair is a multi-blockchain explorer and data API providing unified
  access to on-chain data across 40+ blockchains (Bitcoin, Ethereum, Litecoin, Dogecoin,
  Ripple, Stellar, Monero, Cardano, and more). The REST API at api.blockchair.com
  exposes per-chain dashboards (address, transaction, block), raw node data, network
  stats, a SQL-like database query interface over outputs and other tables, and
  transaction broadcasting, authenticated with a simple key query parameter.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Blockchain
- Cryptocurrency
- Explorer
- Bitcoin
- Ethereum
- On-Chain Data
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
